name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "Dockerfile"
      - "docker-compose.yml"

jobs:
  ci:
    uses: khan-fluent/workflows/.github/workflows/node-ci.yml@v1
    with:
      docker_image_tag: skillforge-test

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: skillforge
          POSTGRES_PASSWORD: skillforge
          POSTGRES_DB: skillforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U skillforge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/server/package-lock.json

      - name: Install dependencies
        working-directory: app/server
        run: npm ci

      - name: Run tests
        working-directory: app/server
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: skillforge
          DB_PASSWORD: skillforge
          TEST_DB_NAME: skillforge_test
          JWT_SECRET: ci-test-jwt-secret
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
        run: npm test
