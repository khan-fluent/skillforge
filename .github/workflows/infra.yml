name: Infrastructure

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
  push:
    branches: [main]
    paths:
      - "terraform/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    if: github.event_name == 'pull_request'
    uses: khan-fluent/workflows/.github/workflows/terraform.yml@v1
    with:
      apply: false
    secrets: inherit

  apply:
    if: github.event_name == 'push'
    uses: khan-fluent/workflows/.github/workflows/terraform.yml@v1
    with:
      apply: true
    secrets: inherit
